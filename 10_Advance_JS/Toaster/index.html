<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Document</title>
</head>

<body>


    <div id="notification-container" class="fixed top-5 right-5 flex flex-col gap-3 z-50"></div>

    <div class="flex flex-col items-center justify-center min-h-screen bg-gray-100">
        <button onclick="showToast('Success! Action completed.', 'success')"
            class="px-6 py-2 m-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Show Success</button>
        <button onclick="showToast('Error! Something went wrong.', 'error')"
            class="px-6 py-2 m-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Show Error</button>
        <button onclick="showToast('Info: New update available.', 'info')"
            class="px-6 py-2 m-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Show Info</button>
        <button onclick="showToast('notification: New notification available.', 'warning')"
            class="px-6 py-2 m-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition">Show noti.</button>
    </div>




    <script src="script.js"></script>
</body>

</html>
