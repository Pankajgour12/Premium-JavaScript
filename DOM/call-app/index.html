<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<button id="addBtn">＋</button>

<div class="formBox">
<form id="form">
<input id="image" placeholder="Image URL" required>
<input id="name" placeholder="Full Name" required>
<input id="town" placeholder="Home Town" required>
<input id="purpose" placeholder="Purpose" required>

<div class="radio">
<label><input type="radio" name="cat" value="emergency">Emergency</label>
<label><input type="radio" name="cat" value="important">Important</label>
<label><input type="radio" name="cat" value="no-rush">No Rush</label>
</div>

<button>Create</button>
</form>
</div>

<div class="stackArea">

<button id="prev">⬅</button>

<div id="stack"></div>

<button id="next">➡</button>

</div>

<script src="script.js"></script>
</body>
</html>
