<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Document</title>
</head>
<body>
  <div class="flex flex-col gap-10 items-center p-4">
    <input class="inp px-5 py-5 rounded outline-none bg-slate-600 text[#888]"  type="text" placeholder="Search">
 <div class="cards flex gap-12 flex-wrap items-center justify-center">
  

 </div>
 <div class="box">
  <textarea class="txt" placeholder="Type something..."></textarea>
  <p class="count">0 / 100</p>
</div>
  </div>

  <div class="min-h-screen bg-slate-900 flex items-center justify-center">

  <button id="showToast"
    class="px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl shadow-lg">
    Show Notification
  </button>

  <div id="toastContainer"
    class="fixed top-5 right-5 flex flex-col gap-3">
  </div>

</div>

<div class="min-h-screen bg-slate-900 flex items-center justify-center">

  <div class="w-[420px] bg-slate-800 p-6 rounded-2xl shadow-xl">

    <h2 class="text-white text-xl mb-4">Add Skills</h2>

    <div id="tagBox"
      class="flex flex-wrap gap-2 p-3 border border-slate-600 rounded-lg bg-slate-900">
      
      <input id="tagInput"
        class="bg-transparent outline-none text-white flex-1 min-w-[120px]"
        placeholder="Type skill & press enter" />
    </div>

  </div>

</div>
  

<script src="script.js"></script>
</body>
</html>
